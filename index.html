<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0012">
  <title>MIU BLOCKS</title>
  <link rel="preload" href="OP.mp3" as="fetch">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="hud">
      <div class="hud-block">
        <span class="label">SCORE</span>
        <span id="score" class="value">0</span>
      </div>
      <div class="hud-block">
        <span class="label">LINES</span>
        <span id="lines" class="value">0</span>
      </div>
      <div class="hud-block">
        <span class="label">LV</span>
        <span id="level" class="value">1</span>
      </div>
    </header>

    <main class="stage-wrap">
      <aside class="game-chrome game-chrome--left" aria-label="ゲーム情報">
        <div class="chrome-card chrome-stats">
          <div class="chrome-stat">
            <span class="chrome-label">SCORE</span>
            <span id="score-side" class="chrome-value">0</span>
          </div>
          <div class="chrome-stat">
            <span class="chrome-label">LINES</span>
            <span id="lines-side" class="chrome-value">0</span>
          </div>
          <div class="chrome-stat">
            <span class="chrome-label">LEVEL</span>
            <span id="level-side" class="chrome-value">1</span>
          </div>
        </div>
        <div class="chrome-card">
          <p class="chrome-title">HOLD</p>
          <div id="hold-preview" class="preview-grid" aria-hidden="true"></div>
        </div>
      </aside>

      <aside class="game-chrome game-chrome--right" aria-label="次ピース情報">
        <div class="chrome-card">
          <p class="chrome-title">NEXT</p>
          <div id="next-preview" class="preview-grid" aria-hidden="true"></div>
        </div>
        <button type="button" id="btn-retry-live" class="home-btn retry-btn hidden" aria-label="やり直し">RETRY</button>
        <button type="button" id="btn-home" class="home-btn hidden" aria-label="タイトルに戻る">HOME</button>
      </aside>

      <canvas id="board" width="200" height="400" aria-label="テトリス盤面"></canvas>
      <div id="overlay" class="overlay hidden">
        <div class="game-over-panel">
          <p class="overlay-title">GAME OVER</p>
          <p class="overlay-score">SCORE <span id="final-score">0</span></p>
          <div class="music-ad-card" aria-label="AIみうの楽曲案内">
            <img id="music-ad-image" class="music-ad-image" src="fire.jpg" alt="AIみう 楽曲ジャケット">
            <p class="music-ad-title">AIみうの曲を聴く</p>
            <p id="music-ad-track" class="music-ad-track">FIRE</p>
            <p class="music-ad-copy">Spotifyでフル再生</p>
            <button type="button" id="btn-spotify" class="music-ad-btn">OPEN SPOTIFY</button>
          </div>
          <div class="game-over-actions">
            <button type="button" id="btn-restart" class="neon-btn">RETRY</button>
            <button type="button" id="btn-home-go" class="home-btn">HOME</button>
          </div>
        </div>
      </div>
      <div id="start-screen" class="overlay">
        <img src="title.jpg" alt="" class="title-image" aria-hidden="true">
        <h1 class="logo" aria-label="MIU BLOCKS">
          <span class="logo-line logo-line--miu">MIU <span class="logo-heart" aria-hidden="true">♡</span></span>
          <span class="logo-line logo-line--blocks">BLOCKS</span>
        </h1>
        <p class="tagline">PINK NEON PUZZLE</p>
        <div class="level-select" role="group" aria-label="開始レベル">
          <button type="button" class="level-btn is-active" data-level="1" aria-pressed="true">1</button>
          <button type="button" class="level-btn" data-level="2" aria-pressed="false">2</button>
          <button type="button" class="level-btn" data-level="3" aria-pressed="false">3</button>
          <button type="button" class="level-btn" data-level="4" aria-pressed="false">4</button>
          <button type="button" class="level-btn" data-level="5" aria-pressed="false">5</button>
        </div>
        <button type="button" id="btn-audio-settings" class="settings-btn" aria-expanded="false" aria-controls="audio-settings-panel">SETTINGS</button>
        <div id="audio-settings-panel" class="audio-settings hidden" aria-label="音量設定">
          <label class="audio-row" for="bgm-volume">
            <span class="audio-label">BGM</span>
            <input id="bgm-volume" class="audio-slider" type="range" min="0" max="100" value="65">
            <span id="bgm-volume-value" class="audio-value">65</span>
          </label>
          <label class="audio-row" for="se-volume">
            <span class="audio-label">SE</span>
            <input id="se-volume" class="audio-slider" type="range" min="0" max="100" value="60">
            <span id="se-volume-value" class="audio-value">60</span>
          </label>
        </div>
        <button type="button" id="btn-start" class="neon-btn">START</button>
      </div>
    </main>

  </div>

  <nav class="controls" aria-label="ゲーム操作">
    <div class="controls-row">
      <button type="button" class="ctrl-btn" data-action="left" data-repeat="true" aria-label="左移動">
        <span class="ctrl-icon" aria-hidden="true">◀</span>
        <span class="ctrl-label">左</span>
      </button>
      <button type="button" class="ctrl-btn ctrl-btn--main" data-action="down" aria-label="ソフトドロップ">
        <span class="ctrl-icon" aria-hidden="true">▼</span>
        <span class="ctrl-label">下</span>
      </button>
      <button type="button" class="ctrl-btn" data-action="right" data-repeat="true" aria-label="右移動">
        <span class="ctrl-icon" aria-hidden="true">▶</span>
        <span class="ctrl-label">右</span>
      </button>
    </div>
    <div class="controls-row">
      <button type="button" class="ctrl-btn" data-action="rotate" aria-label="回転">
        <span class="ctrl-icon" aria-hidden="true">↻</span>
        <span class="ctrl-label">回転</span>
      </button>
      <button type="button" class="ctrl-btn" data-action="hard" aria-label="ハードドロップ">
        <span class="ctrl-icon" aria-hidden="true">⏬</span>
        <span class="ctrl-label">落とす</span>
      </button>
    </div>
  </nav>
  <script src="game.js"></script>
</body>
</html>
